<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics — GradeVault</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">📚</div>
      <div><div class="logo-text">GradeVault</div><div class="logo-sub">Grade Tracker</div></div>
    </div>
    <nav class="sidebar-nav">
      <a href="../index.html" class="nav-item"><span class="nav-icon">🏠</span> Dashboard</a>
      <a href="grades.html" class="nav-item"><span class="nav-icon">📋</span> All Grades</a>
      <a href="analytics.html" class="nav-item active"><span class="nav-icon">📊</span> Analytics</a>
      <a href="students.html" class="nav-item"><span class="nav-icon">👤</span> Students</a>
    </nav>
    <div class="sidebar-footer"><div class="sidebar-footer-text">IndexedDB · Local Storage</div></div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-title">Analytics</div>
    </div>

    <!-- Stats row -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Records</div>
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-badge badge-blue">entries</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Class Average</div>
        <div class="stat-value" id="stat-avg">—</div>
        <div class="stat-badge badge-green">all subjects</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pass Rate</div>
        <div class="stat-value" id="stat-pass">—</div>
        <div class="stat-badge badge-amber">above 60</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Subjects</div>
        <div class="stat-value" id="stat-subjects">0</div>
        <div class="stat-badge badge-blue">tracked</div>
      </div>
    </div>

    <div class="analytics-grid">
      <div class="panel">
        <div class="panel-header"><div class="panel-title">Grade Distribution</div></div>
        <div style="position:relative;height:240px;"><canvas id="chart-dist"></canvas></div>
        <div id="dist-legend" style="display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;font-size:12px;color:var(--muted);"></div>
      </div>
      <div class="panel">
        <div class="panel-header"><div class="panel-title">Average by Subject</div></div>
        <div style="position:relative;height:240px;"><canvas id="chart-subject"></canvas></div>
      </div>
    </div>

    <div class="analytics-grid">
      <div class="panel">
        <div class="panel-header"><div class="panel-title">Score Breakdown</div></div>
        <div id="breakdown"></div>
      </div>
      <div class="panel">
        <div class="panel-header"><div class="panel-title">Top 5 Students</div></div>
        <div id="top-students"></div>
      </div>
    </div>
  </main>
</div>

<script src="../js/db.js"></script>
<script src="../js/app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  async function init() {
    await DB.open();
    await DB.seed();
    const records = await DB.getAll();
    renderStats(records);
    renderDistChart(records);
    renderSubjectChart(records);
    renderBreakdown(records);
    renderTopStudents(records);
  }

  function renderStats(records) {
    document.getElementById('stat-total').textContent = records.length;
    if (!records.length) return;
    const avg = records.reduce((a, r) => a + r.score, 0) / records.length;
    document.getElementById('stat-avg').textContent = avg.toFixed(1);
    const pass = records.filter(r => r.score >= 60).length;
    document.getElementById('stat-pass').textContent = Math.round(pass / records.length * 100) + '%';
    const subjects = new Set(records.map(r => r.subject));
    document.getElementById('stat-subjects').textContent = subjects.size;
  }

  function renderDistChart(records) {
    const buckets = { A: 0, B: 0, C: 0, D: 0, F: 0 };
    records.forEach(r => buckets[gradeFromScore(r.score).letter]++);
    const colors = { A: '#22c55e', B: '#3b82f6', C: '#f59e0b', D: '#f97316', F: '#ef4444' };
    new Chart(document.getElementById('chart-dist'), {
      type: 'doughnut',
      data: {
        labels: Object.keys(buckets),
        datasets: [{ data: Object.values(buckets), backgroundColor: Object.values(colors), borderWidth: 0, hoverOffset: 6 }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '60%' }
    });
    document.getElementById('dist-legend').innerHTML = Object.entries(buckets).map(([l, c]) =>
      `<span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:${colors[l]}"></span>${l}: ${c}</span>`
    ).join('');
  }

  function renderSubjectChart(records) {
    const map = {};
    records.forEach(r => { if (!map[r.subject]) map[r.subject] = []; map[r.subject].push(r.score); });
    const labels = Object.keys(map);
    const avgs = labels.map(s => Math.round(map[s].reduce((a, b) => a + b, 0) / map[s].length));
    new Chart(document.getElementById('chart-subject'), {
      type: 'bar',
      data: { labels, datasets: [{ data: avgs, backgroundColor: '#6c63ff44', borderColor: '#6c63ff', borderWidth: 1.5, borderRadius: 6 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { min: 0, max: 100, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8890aa', font: { size: 11 } } },
          x: { grid: { display: false }, ticks: { color: '#8890aa', font: { size: 11 } } }
        }
      }
    });
  }

  function renderBreakdown(records) {
    const buckets = { A: 0, B: 0, C: 0, D: 0, F: 0 };
    records.forEach(r => buckets[gradeFromScore(r.score).letter]++);
    const colors = { A: '#22c55e', B: '#3b82f6', C: '#f59e0b', D: '#f97316', F: '#ef4444' };
    const total = records.length || 1;
    document.getElementById('breakdown').innerHTML = Object.entries(buckets).map(([l, c]) => {
      const pct = Math.round(c / total * 100);
      return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:13px;">
        <span style="width:20px;text-align:center;font-weight:600;font-family:var(--mono);color:${colors[l]}">${l}</span>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${pct}%;background:${colors[l]}"></div>
        </div>
        <span style="font-size:12px;color:var(--muted);font-family:var(--mono);min-width:60px;text-align:right">${c} (${pct}%)</span>
      </div>`;
    }).join('');
  }

  function renderTopStudents(records) {
    const map = {};
    records.forEach(r => { if (!map[r.name]) map[r.name] = []; map[r.name].push(r.score); });
    const ranked = Object.entries(map)
      .map(([name, scores]) => ({ name, avg: scores.reduce((a, b) => a + b, 0) / scores.length }))
      .sort((a, b) => b.avg - a.avg).slice(0, 5);

    const rankColors = ['rgba(245,158,11,0.2)', 'rgba(156,163,175,0.2)', 'rgba(180,120,60,0.2)'];
    const rankText = ['#f59e0b', '#9ca3af', '#cd7c2a'];

    document.getElementById('top-students').innerHTML = ranked.map((s, i) => {
      const initials = s.name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
      return `<div style="display:flex;align-items:center;gap:12px;padding:10px;border-radius:10px;background:var(--surface2);margin-bottom:8px;">
        <div style="width:24px;height:24px;border-radius:50%;background:${rankColors[i]||'rgba(136,144,170,0.1)'};color:${rankText[i]||'#8890aa'};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;">${i+1}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${s.name}</div>
        </div>
        <div style="font-family:var(--mono);font-size:14px;font-weight:600;">${s.avg.toFixed(1)}</div>
      </div>`;
    }).join('');
  }

  init();
</script>
</body>
</html>
